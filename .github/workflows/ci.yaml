name: CI-CD Pipeline Exercise 4

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    steps:
      - name: Show Environment Info
        run: |
          echo "🚀 Deployment Simulation"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ github.ref_name }}"
          echo "API_URL (base64): $(echo '${{ secrets.API_URL }}' | base64)"
          echo "DB_NAME (base64): $(echo '${{ secrets.DB_NAME }}' | base64)"
